name: Start self-hosted runner
description: Starts a self-hosted runner on an EC2 instance and returns the instance ID and runner label.

inputs:
    aws_role:
        description: The AWS role to assume
        required: true
    aws_region:
        description: The AWS region
        required: true
    github_personal_access_token:
        description: GitHub Personal Access Token with the repo scope assigned
        required: true
    ec2_image_id:
        description: The EC2 image ID
        default: ami-0aa56f6a386a2b5a5 # Amazon Linux 2023 AMI 2023.7.20250414.0 arm64 HVM kernel-6.1
        required: false
    ec2_instance_type:
        description: The EC2 instance type
        default: t4g.small # t4g.small (2 vCPUs, 2 GiB memory, up to 5 Gbps network performance)
        required: false
    iam_role_name:
        description: The IAM role name for the EC2 instance (optional, requires additional permissions)
        required: false
    aws_resource_tags:
        description: The AWS resource tags for the EC2 instance (optional, requires additional permissions)
        default: "[]"
        required: false
    pre-runner-script:
        description: The script to run before starting the runner (optional)
        required: false
        default: |
            sudo yum update -y && \
                sudo yum install docker git libicu -y && \
                sudo systemctl enable docker && \
                sudo systemctl start docker && \
                sudo systemctl enable amazon-ssm-agent && \
                sudo systemctl start amazon-ssm-agent
            sudo fallocate -l 1G /swapfile
            sudo chmod 600 /swapfile
            sudo mkswap /swapfile
            sudo swapon /swapfile
            sudo mkdir -p /disktmp
            sudo chown 777 /disktmp
            sudo mount --bind /disktmp /tmp
    custom-disk-size:
        description: The custom disk size for the EC2 instance (optional)
        default: 8
        required: false # missing means default size (8 GiB for Amazon Linux 2023 AMI)
    custom-disk-name:
        description: The custom disk name for the EC2 instance (optional)
        default: "/dev/xvda"
        required: false # missing means default name (/dev/xvda for Amazon Linux 2023 AMI)
    cache_volume_id:
        description: EBS volume ID to attach as a persistent build cache (optional). The volume is mounted over /var/lib/docker so Docker layer cache and BuildKit cache mounts survive across ephemeral runners.
        required: false

outputs:
    runner_label:
        description: The runner label (to be used with `runs-on`)
        value: ${{ steps.start-runner.outputs.label }}
    ec2_instance_id:
        description: The instance ID of the EC2 instance
        value: ${{ steps.start-runner.outputs.ec2-instance-id }}
    used_spot_instance:
        description: Whether a spot instance was used (true) or on-demand fallback (false)
        value: ${{ steps.start-runner.outputs.used-spot }}
    builder_name:
        description: Name of the pre-configured buildx builder backed by the cache volume, or empty string if no cache volume was provided.
        value: ${{ inputs.cache_volume_id != '' && 'ebs-builder' || '' }}

runs:
    using: "composite"
    steps:
        - name: Configure AWS credentials
          uses: aws-actions/configure-aws-credentials@v4
          with:
              role-to-assume: ${{ inputs.aws_role }}
              aws-region: ${{ inputs.aws_region }}

        - name: Start EC2 runner (spot)
          id: start-runner-spot
          continue-on-error: true
          uses: machulav/ec2-github-runner@v2.6.1
          with:
              mode: start
              market-type: spot
              github-token: ${{ inputs.github_personal_access_token }}
              ec2-instance-type: ${{ inputs.ec2_instance_type }}
              iam-role-name: ${{ inputs.iam_role_name }} # optional, requires additional permissions
              aws-resource-tags: ${{ inputs.aws_resource_tags }} # optional, requires additional permissions
              pre-runner-script: ${{ inputs.pre-runner-script }}
              ec2-volume-size: ${{ inputs.custom-disk-size }}
              ec2-device-name: ${{ inputs.custom-disk-name }}
              availability-zones-config: '[{"imageId":"${{ inputs.ec2_image_id }}","subnetId":"subnet-02cfbd3858e06cac6","securityGroupId":"sg-0cd2a704c5e4aef14"},{"imageId":"${{ inputs.ec2_image_id }}","subnetId":"subnet-05a664a0e17e59fa9","securityGroupId":"sg-0cd2a704c5e4aef14"},{"imageId":"${{ inputs.ec2_image_id }}","subnetId":"subnet-0bf62eb912de11ff5","securityGroupId":"sg-0cd2a704c5e4aef14"}]'

        - name: Start EC2 runner (on-demand fallback)
          id: start-runner-ondemand
          if: steps.start-runner-spot.outcome == 'failure'
          uses: machulav/ec2-github-runner@v2.6.1
          with:
              mode: start
              github-token: ${{ inputs.github_personal_access_token }}
              ec2-instance-type: ${{ inputs.ec2_instance_type }}
              iam-role-name: ${{ inputs.iam_role_name }} # optional, requires additional permissions
              aws-resource-tags: ${{ inputs.aws_resource_tags }} # optional, requires additional permissions
              pre-runner-script: ${{ inputs.pre-runner-script }}
              ec2-volume-size: ${{ inputs.custom-disk-size }}
              ec2-device-name: ${{ inputs.custom-disk-name }}
              availability-zones-config: '[{"imageId":"${{ inputs.ec2_image_id }}","subnetId":"subnet-02cfbd3858e06cac6","securityGroupId":"sg-0cd2a704c5e4aef14"},{"imageId":"${{ inputs.ec2_image_id }}","subnetId":"subnet-05a664a0e17e59fa9","securityGroupId":"sg-0cd2a704c5e4aef14"},{"imageId":"${{ inputs.ec2_image_id }}","subnetId":"subnet-0bf62eb912de11ff5","securityGroupId":"sg-0cd2a704c5e4aef14"}]'

        - name: Resolve runner outputs
          id: start-runner
          shell: bash
          run: |
              if [ "${{ steps.start-runner-spot.outcome }}" = "success" ]; then
                echo "label=${{ steps.start-runner-spot.outputs.label }}" >> "$GITHUB_OUTPUT"
                echo "ec2-instance-id=${{ steps.start-runner-spot.outputs.ec2-instance-id }}" >> "$GITHUB_OUTPUT"
                echo "used-spot=true" >> "$GITHUB_OUTPUT"
              else
                echo "label=${{ steps.start-runner-ondemand.outputs.label }}" >> "$GITHUB_OUTPUT"
                echo "ec2-instance-id=${{ steps.start-runner-ondemand.outputs.ec2-instance-id }}" >> "$GITHUB_OUTPUT"
                echo "used-spot=false" >> "$GITHUB_OUTPUT"
              fi

        - name: Increase root EBS disk size
          if: ${{ inputs.custom-disk-size != 0 }}
          shell: bash
          run: |
              VOLUME_ID=$(aws ec2 describe-instances \
                --instance-ids ${{ steps.start-runner.outputs.ec2-instance-id }} \
                --query "Reservations[0].Instances[0].BlockDeviceMappings[?DeviceName=='/dev/xvda'].Ebs.VolumeId" \
                --output text)

              for i in {1..30}; do
                STATUS=$(aws ssm describe-instance-information \
                  --query "InstanceInformationList[?InstanceId=='${{ steps.start-runner.outputs.ec2-instance-id }}'].PingStatus" \
                  --output text)

                echo "SSM status: $STATUS"
                if [ "$STATUS" = "Online" ]; then
                  echo "Instance is ready for SSM commands."
                  break
                fi

                sleep 2
              done

              if [ "$STATUS" != "Online" ]; then
                echo "Instance never came online for SSM. Aborting." >&2
                exit 1
              fi

              echo "Grow the root partition and resize the filesystem..."
              COMMAND_ID=$(aws ssm send-command \
                --instance-ids ${{ steps.start-runner.outputs.ec2-instance-id }} \
                --document-name "AWS-RunShellScript" \
                --comment "Resize root partition after volume expansion" \
                --parameters 'commands=[
                  "sudo yum install -y cloud-utils-growpart",
                  "sudo growpart /dev/xvda 1",
                  "sudo xfs_growfs -d /"
                ]' \
                --query "Command.CommandId" \
                --output text)

              # Wait for the command to finish and output ongoing stdout and stderr
              LAST_STDOUT=""
              while true; do
                OUTPUT=$(aws ssm get-command-invocation \
                  --command-id "$COMMAND_ID" \
                  --instance-id "${{ steps.start-runner.outputs.ec2-instance-id }}" \
                  --output json)

                STATUS=$(echo "$OUTPUT" | jq -r .Status)
                STDOUT=$(echo "$OUTPUT" | jq -r .StandardOutputContent)
                STDERR=$(echo "$OUTPUT" | jq -r .StandardErrorContent)

                if [[ "$STDOUT" != "$LAST_STDOUT" ]]; then
                  NEW_OUTPUT="${STDOUT#"$LAST_STDOUT"}"
                  echo "$NEW_OUTPUT"
                  LAST_STDOUT="$STDOUT"
                fi

                if [[ "$STATUS" == "Success" || "$STATUS" == "Failed" || "$STATUS" == "Cancelled" || "$STATUS" == "TimedOut" ]]; then
                  echo
                  echo "Command finished with status: $STATUS"
                  if [[ -n "$STDERR" ]]; then
                    echo "--- STDERR ---"
                    echo "$STDERR"
                  fi
                  break
                fi

                sleep 3
              done

              if [ "$STATUS" != "Success" ]; then
                echo "Partition resize never reached success. Aborting." >&2
                exit 1
              fi

        - name: Wait for SSM agent (cache volume)
          if: ${{ inputs.cache_volume_id != '' }}
          shell: bash
          run: |
              for i in {1..60}; do
                STATUS=$(aws ssm describe-instance-information \
                  --query "InstanceInformationList[?InstanceId=='${{ steps.start-runner.outputs.ec2-instance-id }}'].PingStatus" \
                  --output text)

                echo "SSM status: $STATUS"
                if [ "$STATUS" = "Online" ]; then
                  echo "Instance is ready for SSM commands."
                  break
                fi

                sleep 5
              done

              if [ "$STATUS" != "Online" ]; then
                echo "Instance never came online for SSM. Aborting." >&2
                exit 1
              fi

        - name: Attach cache EBS volume
          if: ${{ inputs.cache_volume_id != '' }}
          shell: bash
          run: |
              INSTANCE_ID="${{ steps.start-runner.outputs.ec2-instance-id }}"
              VOLUME_ID="${{ inputs.cache_volume_id }}"

              echo "Attaching $VOLUME_ID to $INSTANCE_ID..."
              aws ec2 attach-volume \
                --volume-id "$VOLUME_ID" \
                --instance-id "$INSTANCE_ID" \
                --device /dev/sdf

              echo "Waiting for volume to reach in-use state..."
              for i in {1..60}; do
                STATE=$(aws ec2 describe-volumes \
                  --volume-ids "$VOLUME_ID" \
                  --query "Volumes[0].Attachments[0].State" \
                  --output text)

                echo "Attachment state: $STATE"
                if [ "$STATE" = "attached" ]; then
                  echo "Volume attached."
                  break
                fi

                sleep 5
              done

              if [ "$STATE" != "attached" ]; then
                echo "Volume never reached attached state. Aborting." >&2
                exit 1
              fi

        - name: Mount cache volume and configure Docker
          if: ${{ inputs.cache_volume_id != '' }}
          shell: bash
          run: |
              VOLUME_ID="${{ inputs.cache_volume_id }}"
              # Strip dashes for the /dev/disk/by-id symlink name
              VOLUME_ID_NODASH="${VOLUME_ID//-/}"

              COMMAND_ID=$(aws ssm send-command \
                --instance-ids "${{ steps.start-runner.outputs.ec2-instance-id }}" \
                --document-name "AWS-RunShellScript" \
                --comment "Mount cache EBS volume over /var/lib/docker" \
                --parameters commands="[
                  \"set -euo pipefail\",
                  \"DEVICE_LINK=/dev/disk/by-id/nvme-Amazon_Elastic_Block_Store_${VOLUME_ID_NODASH}\",
                  \"echo Waiting for device symlink \$DEVICE_LINK...\",
                  \"for i in \$(seq 1 30); do [ -L \\\"\$DEVICE_LINK\\\" ] && break; sleep 2; done\",
                  \"[ -L \\\"\$DEVICE_LINK\\\" ] || { echo Device symlink never appeared >&2; exit 1; }\",
                  \"DEVICE=\$(readlink -f \\\"\$DEVICE_LINK\\\")\",
                  \"echo Device is \$DEVICE\",
                  \"if ! blkid \\\"\$DEVICE\\\" > /dev/null 2>&1; then echo First use, formatting...; mkfs.ext4 \\\"\$DEVICE\\\"; fi\",
                  \"systemctl stop docker\",
                  \"mkdir -p /mnt/docker-cache\",
                  \"mount \\\"\$DEVICE\\\" /mnt/docker-cache\",
                  \"mkdir -p /mnt/docker-cache/docker\",
                  \"mount --bind /mnt/docker-cache/docker /var/lib/docker\",
                  \"systemctl start docker\",
                  \"docker buildx create --name ebs-builder --driver docker-container --bootstrap --use 2>/dev/null || docker buildx use ebs-builder\",
                  \"echo Cache volume mounted and Docker configured.\"
                ]" \
                --query "Command.CommandId" \
                --output text)

              LAST_STDOUT=""
              while true; do
                OUTPUT=$(aws ssm get-command-invocation \
                  --command-id "$COMMAND_ID" \
                  --instance-id "${{ steps.start-runner.outputs.ec2-instance-id }}" \
                  --output json)

                STATUS=$(echo "$OUTPUT" | jq -r .Status)
                STDOUT=$(echo "$OUTPUT" | jq -r .StandardOutputContent)
                STDERR=$(echo "$OUTPUT" | jq -r .StandardErrorContent)

                if [[ "$STDOUT" != "$LAST_STDOUT" ]]; then
                  NEW_OUTPUT="${STDOUT#"$LAST_STDOUT"}"
                  echo "$NEW_OUTPUT"
                  LAST_STDOUT="$STDOUT"
                fi

                if [[ "$STATUS" == "Success" || "$STATUS" == "Failed" || "$STATUS" == "Cancelled" || "$STATUS" == "TimedOut" ]]; then
                  echo
                  echo "Command finished with status: $STATUS"
                  if [[ -n "$STDERR" ]]; then
                    echo "--- STDERR ---"
                    echo "$STDERR"
                  fi
                  break
                fi

                sleep 3
              done

              if [ "$STATUS" != "Success" ]; then
                echo "Cache volume mount never reached success. Aborting." >&2
                exit 1
              fi
