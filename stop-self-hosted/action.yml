name: Stop self-hosted runner
description: Stops a self-hosted runner on an EC2 instance.

inputs:
    aws_role:
        description: The AWS role to assume
        required: true
    aws_region:
        description: The AWS region
        required: true
    github_personal_access_token:
        description: GitHub Personal Access Token with the repo scope assigned
        required: true
    runner_label:
        description: The runner label
        required: true
    ec2_instance_id:
        description: The instance ID of the EC2 instance
        required: true
    cache_volume_id:
        description: EBS volume ID that was attached as a persistent build cache (optional). Will be unmounted and detached before the instance is terminated.
        required: false
        default: ""

runs:
    using: "composite"
    steps:
        - name: Configure AWS credentials
          uses: aws-actions/configure-aws-credentials@v4
          with:
              role-to-assume: ${{ inputs.aws_role }}
              aws-region: ${{ inputs.aws_region }}

        - name: Unmount cache volume
          if: ${{ inputs.cache_volume_id != '' }}
          shell: bash
          run: |
              COMMAND_ID=$(aws ssm send-command \
                --instance-ids "${{ inputs.ec2_instance_id }}" \
                --document-name "AWS-RunShellScript" \
                --comment "Unmount cache EBS volume" \
                --parameters 'commands=[
                  "set -euo pipefail",
                  "systemctl stop docker || true",
                  "umount /var/lib/docker || true",
                  "umount /mnt/docker-cache || true",
                  "echo Cache volume unmounted."
                ]' \
                --query "Command.CommandId" \
                --output text)

              LAST_STDOUT=""
              while true; do
                OUTPUT=$(aws ssm get-command-invocation \
                  --command-id "$COMMAND_ID" \
                  --instance-id "${{ inputs.ec2_instance_id }}" \
                  --output json)

                STATUS=$(echo "$OUTPUT" | jq -r .Status)
                STDOUT=$(echo "$OUTPUT" | jq -r .StandardOutputContent)
                STDERR=$(echo "$OUTPUT" | jq -r .StandardErrorContent)

                if [[ "$STDOUT" != "$LAST_STDOUT" ]]; then
                  NEW_OUTPUT="${STDOUT#"$LAST_STDOUT"}"
                  echo "$NEW_OUTPUT"
                  LAST_STDOUT="$STDOUT"
                fi

                if [[ "$STATUS" == "Success" || "$STATUS" == "Failed" || "$STATUS" == "Cancelled" || "$STATUS" == "TimedOut" ]]; then
                  echo
                  echo "Command finished with status: $STATUS"
                  if [[ -n "$STDERR" ]]; then
                    echo "--- STDERR ---"
                    echo "$STDERR"
                  fi
                  break
                fi

                sleep 3
              done

              if [ "$STATUS" != "Success" ]; then
                echo "Unmount command failed (status: $STATUS). Proceeding with detach anyway." >&2
              fi

        - name: Detach cache EBS volume
          if: ${{ inputs.cache_volume_id != '' }}
          shell: bash
          run: |
              VOLUME_ID="${{ inputs.cache_volume_id }}"

              echo "Detaching $VOLUME_ID..."
              aws ec2 detach-volume --volume-id "$VOLUME_ID" || true

              echo "Waiting for volume to reach available state..."
              for i in {1..60}; do
                STATE=$(aws ec2 describe-volumes \
                  --volume-ids "$VOLUME_ID" \
                  --query "Volumes[0].State" \
                  --output text)

                echo "Volume state: $STATE"
                if [ "$STATE" = "available" ]; then
                  echo "Volume detached."
                  break
                fi

                sleep 5
              done

              if [ "$STATE" != "available" ]; then
                echo "Volume never reached available state after detach." >&2
              fi

        - name: Stop EC2 runner
          uses: machulav/ec2-github-runner@v2.6.1
          with:
              mode: stop
              github-token: ${{ inputs.github_personal_access_token }}
              label: ${{ inputs.runner_label }}
              ec2-instance-id: ${{ inputs.ec2_instance_id }}
