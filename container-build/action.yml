name: Build container image
description: Builds a Docker image and outputs it as a .tar file

inputs:
    image:
        description: The image name
        required: true
    tag:
        description: The tag name
        default: staging
        required: false
    context:
        description: Build context path
        default: .
        required: false
    builder:
        description: Name of a pre-configured buildx builder to use (optional). When set, the GHA layer cache is skipped in favour of the builder's own persistent cache.
        required: false
        default: ""

runs:
    using: "composite"
    steps:
        - name: Set up Docker Buildx (no persistent builder)
          if: ${{ inputs.builder == '' }}
          uses: docker/setup-buildx-action@v3
          with:
              version: latest

        - name: Build image (with GHA cache)
          if: ${{ inputs.builder == '' }}
          uses: docker/build-push-action@v6
          with:
              context: ${{ inputs.context }}
              cache-from: type=gha
              cache-to: type=gha,mode=max,compression=zstd,compression-level=3
              tags: ${{ inputs.image }}:${{ inputs.tag }}
              load: true

        - name: Build image (with persistent builder cache)
          if: ${{ inputs.builder != '' }}
          uses: docker/build-push-action@v6
          with:
              context: ${{ inputs.context }}
              builder: ${{ inputs.builder }}
              tags: ${{ inputs.image }}:${{ inputs.tag }}
              load: true

        - name: Save Docker image
          shell: bash
          run: docker save -o ${{ inputs.image }}.tar ${{ inputs.image }}:${{ inputs.tag }}
